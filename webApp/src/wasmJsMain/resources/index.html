<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ar-Ge Süreç Yönetimi</title>
    <script src="skiko.js"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0D1B2A;
        }

        #compose-target {
            width: 100%;
            height: 100%;
        }

        /* Loading Spinner */
        .loading-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #FFFFFF;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-container">
        <div class="spinner"></div>
        <div>Ar-Ge Süreç Yönetimi Yükleniyor...</div>
    </div>
    <canvas id="compose-target"></canvas>
    <script src="webApp.js"></script>
    <script>
        // Placeholder for potentially removing loader if needed manually
        // but Compose usually takes over the canvas.
    </script>
</body>
</html>
